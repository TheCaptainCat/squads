# squads default workflow specification
# Encodes the vocabulary byte-for-byte, including capability flags (is_meta,
# subentity_kind, parent_required, ref_rules) and StatusSpec.role.
# Loaded and validated by load_workflow_spec() in _loader.py.
# DO NOT edit without updating the golden-lock test in tests/test_workflow_spec.py.
#
# [collections.*] + the `fields` lists below are the badge vocabulary — the bundled
# priority/severity collections/fields ARE the runtime vocabulary now (no more Priority/Severity
# enums); "does type/kind X carry field Y" is a fields_for(X) lookup.

# ---------------------------------------------------------------------------
# Named lifecycle state machines — item lifecycles and sub-entity lifecycles
# all live in one merged namespace (names don't collide).
#
# Item lifecycles:    work, adr, review, bug, guide, agent
# Sub-entity kinds:   subtask, story, finding  (referenced by kind name)
# ---------------------------------------------------------------------------

[lifecycles.work]
# Work items: Draft → Ready → InProgress → InReview → Done (+ Blocked, Cancelled)
initial = "Draft"

[lifecycles.work.transitions]
Draft = ["Ready", "InProgress", "Cancelled"]
Ready = ["InProgress", "Blocked", "Cancelled"]
InProgress = ["InReview", "Blocked", "Done", "Cancelled"]
InReview = ["InProgress", "Done", "Blocked", "Cancelled"]
Blocked = ["Ready", "InProgress", "Cancelled"]
Done = ["InProgress"]
Cancelled = ["Draft"]

[lifecycles.adr]
# ADR: Proposed → Accepted → Superseded (+ Rejected, Deprecated)
initial = "Proposed"

[lifecycles.adr.transitions]
Proposed = ["Accepted", "Rejected"]
Accepted = ["Superseded", "Deprecated"]
Rejected = ["Proposed"]
Superseded = []
Deprecated = []

[lifecycles.review]
# Code review: Requested → InReview → ChangesRequested → Approved (+ Rejected)
initial = "Requested"

[lifecycles.review.transitions]
Requested = ["InReview", "Rejected"]
InReview = ["ChangesRequested", "Approved", "Rejected"]
ChangesRequested = ["InReview", "Approved", "Rejected"]
Approved = []
Rejected = []

[lifecycles.bug]
# Bug: Open → InProgress → Fixed → Verified (+ WontFix, Blocked, Cancelled)
initial = "Open"

[lifecycles.bug.transitions]
Open = ["InProgress", "WontFix", "Cancelled"]
InProgress = ["Fixed", "Blocked", "WontFix", "Cancelled"]
Fixed = ["Verified", "InProgress"]
Verified = ["InProgress"]
Blocked = ["InProgress", "WontFix", "Cancelled"]
WontFix = ["Open"]
Cancelled = ["Open"]

[lifecycles.guide]
# Guide: Draft → Published → Deprecated
initial = "Draft"

[lifecycles.guide.transitions]
Draft = ["Published"]
Published = ["Deprecated", "Draft"]
Deprecated = ["Published"]

[lifecycles.agent]
# Role / Skill / Operator: Draft → Active → Archived
initial = "Draft"

[lifecycles.agent.transitions]
Draft = ["Active"]
Active = ["Archived"]
Archived = ["Active"]

# Sub-entity lifecycles — keyed by kind name.
# subtask and story share the same machine definition (duplicated intentionally
# to keep the merged namespace flat with no extra indirection).

[lifecycles.subtask]
initial = "Todo"

[lifecycles.subtask.transitions]
Todo = ["InProgress", "Blocked", "Cancelled"]
InProgress = ["Done", "Blocked", "Cancelled"]
Blocked = ["InProgress", "Cancelled"]
Done = ["InProgress"]
Cancelled = ["Todo"]

[lifecycles.story]
# Story reuses the subtask lifecycle (same transitions).
initial = "Todo"

[lifecycles.story.transitions]
Todo = ["InProgress", "Blocked", "Cancelled"]
InProgress = ["Done", "Blocked", "Cancelled"]
Blocked = ["InProgress", "Cancelled"]
Done = ["InProgress"]
Cancelled = ["Todo"]

[lifecycles.finding]
# Review findings: Open → Fixed → Verified (+ WontFix)
initial = "Open"

[lifecycles.finding.transitions]
Open = ["Fixed", "WontFix"]
Fixed = ["Verified", "Open"]
Verified = []
WontFix = ["Open"]

# ---------------------------------------------------------------------------
# Statuses (terminal flag + optional sub-entity badge + completion flag)
# terminal mirrors today's TERMINAL frozenset exactly (unchanged — completion is additive,
# not a replacement for it; "Fixed" is completion=true for the finding machine below without
# being terminal=true, since "Fixed" is also the (non-terminal, pending-verification) bug
# item status and StatusSpec.terminal is one flag per status name shared across every
# lifecycle that uses it).
# badge is declared for the 9 sub-entity statuses only; other statuses render the graceful
# default when their badge is looked up.
# completion is declared only for the two sub-entity/finding machines' designated
# done-toggle targets (Done for subtask/story, Fixed for finding) — see
# WorkflowSpec._check_completion_status. It carries no meaning for work-item/ADR/review/
# guide/agent lifecycles.
# ---------------------------------------------------------------------------

[statuses.Draft]
terminal = false

[statuses.Ready]
terminal = false

[statuses.InProgress]
terminal = false
badge = "🟡"

[statuses.InReview]
terminal = false

[statuses.Done]
terminal = true
completion = true
badge = "🟢"

[statuses.Blocked]
terminal = false
badge = "🔴"

[statuses.Cancelled]
terminal = true
badge = "⚫"

[statuses.Proposed]
terminal = false

[statuses.Accepted]
terminal = true

[statuses.Superseded]
terminal = true
role = "superseded"

[statuses.Rejected]
terminal = true

[statuses.Deprecated]
terminal = true

[statuses.Requested]
terminal = false

[statuses.ChangesRequested]
terminal = false

[statuses.Approved]
terminal = true

[statuses.Published]
terminal = true

[statuses.Active]
terminal = false

[statuses.Archived]
terminal = true

[statuses.Todo]
terminal = false
badge = "⚪"

[statuses.Open]
terminal = false
badge = "🔴"

[statuses.Fixed]
terminal = false
completion = true
badge = "🟡"

[statuses.Verified]
terminal = true
badge = "🟢"

[statuses.WontFix]
terminal = true
badge = "⚫"

# ---------------------------------------------------------------------------
# Collections — reusable badge libraries. priority/severity are the sole vocabulary for
# those two axes (no more Priority/Severity enums) — codes/labels/emoji/default here ARE
# what renders, resolved via fields_for()/WorkflowSpec.collection() at runtime.
# ---------------------------------------------------------------------------

[collections.priority]
label = "Priority"
ordered = true
badges = [
  { code = "urgent", label = "Urgent", emoji = "🔴" },
  { code = "high",   label = "High",   emoji = "🟠" },
  { code = "medium", label = "Medium", emoji = "🟡" },
  { code = "low",    label = "Low",    emoji = "🟢" },
]

[collections.severity]
label = "Severity"
ordered = true
default = "medium"
badges = [
  { code = "critical", label = "Critical", emoji = "🔴" },
  { code = "high",     label = "High",     emoji = "🟠" },
  { code = "medium",   label = "Medium",   emoji = "🟡" },
  { code = "low",      label = "Low",      emoji = "🟢" },
  { code = "info",     label = "Info",     emoji = "🔵" },
]

# ---------------------------------------------------------------------------
# Items (prefix / folder / lifecycle / parents / aliases)
# This table is the sole vocabulary source for prefix/folder/allowed-parents/aliases.
# parents = [] means unconstrained (any parent or none is valid).
#
# `order` is the explicit CLI registration/display order (ascending; type name breaks
# ties) — a float, deliberately spaced by 10 so a future type can be inserted between
# two existing ones (even fractionally, e.g. 25.5 between task and bug) without
# renumbering everything. Work types keep today's logical sequence; meta types
# (role/skill/operator) come after them for completeness, though they register via
# their own dedicated subcommands rather than this ordering. A type that omits
# `order` defaults to +inf (ItemSpec.order) — sorts after every value declared here.
# ---------------------------------------------------------------------------

[items.epic]
prefix = "EPIC"
folder = "epics"
lifecycle = "work"
parents = []
aliases = ["e"]
order = 10
is_meta = false
ref_rules = []
fields = [{ code = "priority", label = "Priority", collection = "priority" }]
# subentity_kind absent → None (no sub-entities)
# parent_required absent → None (unconstrained)

[items.feature]
prefix = "FEAT"
folder = "features"
lifecycle = "work"
parents = ["epic"]
aliases = ["feat", "f"]
order = 20
is_meta = false
subentity_kind = "story"
ref_rules = []
fields = [{ code = "priority", label = "Priority", collection = "priority" }]
# parent_required absent → None (unconstrained — any parent or none is valid)

[items.task]
prefix = "TASK"
folder = "tasks"
lifecycle = "work"
parents = ["feature"]
aliases = ["t"]
order = 30
is_meta = false
subentity_kind = "subtask"
parent_required = "feature"
ref_rules = [
  { kind = "fixes", hint = "link a bug or review with `sq ref add <task> <id> --kind fixes|addresses`" },
  { kind = "addresses", hint = "link a bug or review with `sq ref add <task> <id> --kind fixes|addresses`" },
]
fields = [{ code = "priority", label = "Priority", collection = "priority" }]

[items.bug]
prefix = "BUG"
folder = "bugs"
lifecycle = "bug"
parents = []
aliases = ["b"]
order = 40
is_meta = false
ref_rules = []
fields = [
  { code = "priority", label = "Priority", collection = "priority" },
  { code = "severity", label = "Severity", collection = "severity", required = false, default = "medium" },
]
# subentity_kind absent → None
# parent_required absent → None

[items.decision]
prefix = "ADR"
folder = "adrs"
lifecycle = "adr"
parents = []
aliases = ["dec", "d"]
order = 50
is_meta = false
ref_rules = [{ kind = "supersedes", hint = "" }]
fields = [{ code = "priority", label = "Priority", collection = "priority" }]
# subentity_kind absent → None
# parent_required absent → None

[items.review]
prefix = "REV"
folder = "reviews"
lifecycle = "review"
parents = []
aliases = ["rev", "r"]
order = 60
is_meta = false
subentity_kind = "finding"
ref_rules = []
fields = [{ code = "priority", label = "Priority", collection = "priority" }]
# parent_required absent → None

[items.guide]
prefix = "GUIDE"
folder = "guides"
lifecycle = "guide"
parents = []
aliases = ["g"]
order = 70
is_meta = false
ref_rules = []
fields = [{ code = "priority", label = "Priority", collection = "priority" }]
# subentity_kind absent → None
# parent_required absent → None

[items.role]
prefix = "ROLE"
folder = "agents/roles"
lifecycle = "agent"
parents = []
aliases = []
order = 80
is_meta = true
ref_rules = []
# subentity_kind absent → None
# parent_required absent → None

[items.skill]
prefix = "SKILL"
folder = "agents/skills"
lifecycle = "agent"
parents = []
aliases = []
order = 90
is_meta = true
ref_rules = []
# subentity_kind absent → None
# parent_required absent → None

[items.operator]
prefix = "OP"
folder = "operators"
lifecycle = "agent"
parents = []
aliases = []
order = 100
is_meta = true
ref_rules = []
# subentity_kind absent → None
# parent_required absent → None

# ---------------------------------------------------------------------------
# Sub-entity kinds — machine binding (`lifecycle`) + CLI/storage vocabulary
# (`plural`/`local_prefix`/`placeholder`/`maps_parent_story`) + field declarations
# (mirrors the item `fields` mechanism). `lifecycle` is an explicit reference, mirroring
# `ItemSpec.lifecycle` — it happens to equal the kind name for all three bundled kinds
# today (retiring the *implicit* convention the engine used to rely on), but a custom
# kind is free to share a machine with another kind by naming the same lifecycle.
# ---------------------------------------------------------------------------

[subentity_kinds.story]
lifecycle = "story"
plural = "stories"
local_prefix = "US"
placeholder = "_Write the user story (e.g. “As an <role>, I want … so that …”) and its acceptance criteria here — free-form paragraphs or bullet lists._"

[subentity_kinds.subtask]
lifecycle = "subtask"
plural = "subtasks"
local_prefix = "ST"
placeholder = "_Describe this subtask here — free-form paragraphs or bullet lists._"
maps_parent_story = true

[subentity_kinds.finding]
lifecycle = "finding"
plural = "findings"
local_prefix = "F"
placeholder = "_Describe the finding, its impact, and a recommendation — free-form._"
fields = [
  { code = "severity", label = "Severity", collection = "severity", required = true, default = "medium" },
]
