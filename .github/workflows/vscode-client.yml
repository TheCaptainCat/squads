name: vscode-client

# Dev-time TS gate for clients/vscode, path-filtered so it's independent of and
# non-gating for the Python core's CI (test.yml) in both directions. That mutual
# isolation is only as strong as the path filters, though — no branch-protection
# required-checks config lives in this repo to enforce it.
#
# `schedule` ignores `paths` entirely (GitHub only path-filters push/pull_request),
# so the nightly cron runs this whole workflow regardless of what changed. `check`/
# `test`/`e2e` opt out of that tick (nothing to catch with no clients/vscode diff);
# `canary` doesn't, so it catches core `sq --json`/`--raw` drift within a day rather
# than waiting on the next clients/vscode-touching PR.

on:
  push:
    branches: [main]
    paths:
      - "clients/vscode/**"
  pull_request:
    branches: [main]
    paths:
      - "clients/vscode/**"
  schedule:
    - cron: "17 3 * * *" # nightly skew-canary run, see the note above

defaults:
  run:
    working-directory: clients/vscode

jobs:
  check:
    name: check (tsc + eslint + prettier)
    runs-on: ubuntu-latest
    # Skip the nightly schedule tick: this job gates clients/vscode's own dev-time surface,
    # which the schedule (added so `canary` runs regardless of what changed) has no reason to
    # re-run absent a clients/vscode change.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - name: npm run check (tsc --noEmit + eslint --max-warnings 0 + prettier --check)
        run: npm run check

  test:
    name: test
    runs-on: ubuntu-latest
    # Skip the nightly schedule tick — same reasoning as `check` above.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - name: npm test
        run: npm test

  e2e:
    name: extension-host smoke test (Xvfb headless)
    runs-on: ubuntu-latest
    # Skip the nightly schedule tick — same reasoning as `check` above; the extension-host
    # smoke test also gates clients/vscode's own surface, not the cross-language skew canary.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - run: npm run compile
      - name: npm run test:e2e (real Extension Development Host, headless via Xvfb)
        run: xvfb-run -a npm run test:e2e

  canary:
    name: skew canary (real sq vs committed fixtures)
    runs-on: ubuntu-latest
    # No `if:` here (unlike check/test/e2e above): this job runs both on the existing
    # clients/vscode/**-filtered push/pull_request triggers AND on every nightly `schedule`
    # tick regardless of what changed — see the note above `on:`.
    steps:
      - uses: actions/checkout@v6.0.3

      # Provision a real `sq` for the skew canary — the one place this workflow touches
      # Python. `working-directory: .` overrides the workflow-level default (clients/vscode)
      # for just this step, since `uv sync` needs the repo root's pyproject.toml/uv.lock.
      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@v8.2.0
      - name: uv sync (provisions sq for the canary)
        working-directory: .
        run: uv sync --frozen
      - name: put the provisioned sq on PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - name: sanity-check sq resolves from the provisioned venv
        run: sq --version

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - name: npm run test:canary (sq tree/list/show --raw vs committed fixtures)
        run: npm run test:canary
