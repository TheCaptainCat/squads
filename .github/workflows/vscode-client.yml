name: vscode-client

# Dev-time TS gate for clients/vscode: kept on a separate
# workflow, keyed on clients/vscode/** path filters, so it is independent of
# and non-gating for the Python core's CI (test.yml) — a red job here never
# blocks a Python-only change, and a Python-only change never triggers this
# workflow at all. The reverse holds too: test.yml has no clients/** trigger
# and is never touched by this file. Cross-language coupling is caught only
# by the package's own integration skew canary, by design — which is why the
# `canary` job below is the one place this workflow provisions a real `sq`
# (via `uv sync` against the repo's own pyproject.toml) rather than treating
# clients/vscode as a fully Python-free lane; it never touches the Python
# gate itself (no ruff/pyright/pytest here).
#
# Note: path-filtered triggers alone make this workflow not *run* on
# Python-only changes, but they don't make it a required check. Full
# non-gating enforcement (this job required on clients/vscode/** PRs, the
# Python job required on Python-only PRs, neither blocking the other) also
# needs branch-protection / required-status-checks configuration in the
# GitHub repo settings — that's outside this repo's files and hasn't been
# configured here.
#
# Coverage caveat closed: the push/pull_request triggers below are still
# path-filtered to clients/vscode/**, so a core-only PR that drifts the `sq
# --json`/`--raw` surface doesn't fire the skew canary at PR time (the
# isolation is by design — see above). `schedule` isn't gated by `paths` at
# all (GitHub only applies path filters to push/pull_request), so the
# nightly cron below runs the whole workflow regardless of what changed —
# `check`/`test` opt out of that tick (they gate clients/vscode's own
# dev-time surface; nothing to catch nightly with no clients/vscode diff),
# leaving only `canary`, which re-checks the committed fixtures against a
# real `sq` every night. Core-only drift is caught within at most a day
# instead of latently on the next clients/vscode-touching PR, with no new
# path filter on this workflow's main triggers (which would otherwise pull
# Python-only PRs back into running `check`/`test` too).

on:
  push:
    branches: [main]
    paths:
      - "clients/vscode/**"
  pull_request:
    branches: [main]
    paths:
      - "clients/vscode/**"
  schedule:
    - cron: "17 3 * * *" # nightly skew-canary run, see the coverage-caveat note above

defaults:
  run:
    working-directory: clients/vscode

jobs:
  check:
    name: check (tsc + eslint + prettier)
    runs-on: ubuntu-latest
    # Skip the nightly schedule tick: this job gates clients/vscode's own dev-time surface,
    # which the schedule (added so `canary` runs regardless of what changed) has no reason to
    # re-run absent a clients/vscode change.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - name: npm run check (tsc --noEmit + eslint --max-warnings 0 + prettier --check)
        run: npm run check

  test:
    name: test
    runs-on: ubuntu-latest
    # Skip the nightly schedule tick — same reasoning as `check` above.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - name: npm test
        run: npm test

  e2e:
    name: extension-host smoke test (Xvfb headless)
    runs-on: ubuntu-latest
    # Skip the nightly schedule tick — same reasoning as `check` above; the extension-host
    # smoke test also gates clients/vscode's own surface, not the cross-language skew canary.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - run: npm run compile
      - name: npm run test:e2e (real Extension Development Host, headless via Xvfb)
        run: xvfb-run -a npm run test:e2e

  canary:
    name: skew canary (real sq vs committed fixtures)
    runs-on: ubuntu-latest
    # No `if:` here (unlike check/test/e2e above): this job runs both on the existing
    # clients/vscode/**-filtered push/pull_request triggers AND on every nightly `schedule`
    # tick regardless of what changed — see the coverage-caveat note above `on:` (closes F1).
    steps:
      - uses: actions/checkout@v6.0.3

      # Provision a real `sq` for the skew canary — the one place this workflow touches
      # Python. `working-directory: .` overrides the workflow-level default (clients/vscode)
      # for just this step, since `uv sync` needs the repo root's pyproject.toml/uv.lock.
      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@v8.2.0
      - name: uv sync (provisions sq for the canary)
        working-directory: .
        run: uv sync --frozen
      - name: put the provisioned sq on PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - name: sanity-check sq resolves from the provisioned venv
        run: sq --version

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json
      - run: npm ci
      - name: npm run test:canary (sq tree/list/show --raw vs committed fixtures)
        run: npm run test:canary
