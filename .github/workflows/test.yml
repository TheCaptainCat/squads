name: test

# Path-scoped off TS-only changes: clients/vscode/** has its own
# dev-time gate (vscode-client.yml), so a TS-only or doc-only change doesn't
# need to run the full Python OS matrix. Mirrors the isolation vscode-client.yml
# already has in the other direction (it triggers only on clients/vscode/**).
#
# Branch-protection caveat (checked at the time this filter was added: `main`
# currently has NO required status checks configured, so this is safe today).
# If `test.yml`'s jobs are ever made *required* checks on `main`, a
# paths-ignore-skipped run leaves those required checks stuck "pending" and
# blocks merge of TS-only PRs (GitHub required-checks semantics: a required
# check that never runs never reports success). Before adding branch
# protection that requires these jobs, either (a) don't mark them required,
# or (b) add an always-running "gate passed" aggregation job (not
# path-filtered) that the branch protection requires instead, which
# short-circuits to success when the Python jobs were skipped.
on:
  push:
    branches: [main]
    paths-ignore:
      - "clients/vscode/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "clients/vscode/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format
        run: uv run ruff format --check .
      - name: pyright
        run: uv run pyright
      - name: manifest freshness
        run: python scripts/gen_template_manifest.py --check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen --all-extras
      - name: pytest
        run: uv run pytest
