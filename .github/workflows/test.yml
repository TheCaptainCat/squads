name: test

# Path-scoped off TS-only changes: clients/vscode/** has its own dev-time gate
# (vscode-client.yml), so a TS-only or doc-only change skips the full Python OS matrix.
#
# Caveat: `main` has no required status checks today, so this is safe. If these jobs
# are ever made *required*, a paths-ignore-skipped run leaves them stuck "pending"
# forever and blocks merge — either don't mark them required, or add an always-running
# aggregation job (not path-filtered) for branch protection to require instead.
on:
  push:
    branches: [main]
    paths-ignore:
      - "clients/vscode/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "clients/vscode/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format
        run: uv run ruff format --check .
      - name: pyright
        run: uv run pyright
      - name: manifest freshness
        run: python scripts/gen_template_manifest.py --check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen --all-extras
      - name: pytest
        run: uv run pytest
