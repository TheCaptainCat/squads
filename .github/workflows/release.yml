name: release

# Builds the VS Code client into a VSIX and attaches it to the tagged GitHub
# release as a downloadable asset (ADR-427 #4, packaging). This is the
# *release* pipeline — distinct from clients/vscode's dev-time gate
# (vscode-client.yml) — so it triggers only on a version tag, never on every
# push.
#
# Unified version (ADR-427 #5): the extension carries no independent semver.
# Its version is set at build time from the core's pyproject.toml version
# (the single release bump), not the placeholder value committed in
# clients/vscode/package.json — so the bundle's client always matches the
# core it was built against.
#
# Marketplace / Open VSX publishing is explicitly deferred (ADR-427 #4 open
# item, needs a publisher account + CI credentials, unsettled for 0.10).
# This workflow only builds the VSIX and uploads it as a release asset —
# nothing here publishes to a marketplace.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-vsix:
    name: build VSIX release asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version-file: pyproject.toml
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json

      - name: read core version (unified version, ADR-427 #5)
        id: core-version
        run: |
          version=$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: install client dependencies
        working-directory: clients/vscode
        run: npm ci

      - name: compile
        working-directory: clients/vscode
        run: npm run compile

      - name: set client version to the core version
        working-directory: clients/vscode
        run: npm version "${{ steps.core-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: package VSIX
        working-directory: clients/vscode
        run: npx @vscode/vsce package --no-dependencies -o "../../squads-vscode-${{ steps.core-version.outputs.version }}.vsix"

      - name: attach VSIX to the tagged release
        uses: softprops/action-gh-release@v2
        with:
          files: squads-vscode-*.vsix
