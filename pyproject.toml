[project]
name = "squads"
version = "0.1.0"
description = "Manage a team of AI agents working on a code project: bootstrap roles & skills, track work with JIRA-like IDs in predictable markdown."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "MIT" }
authors = [{ name = "Pierre Chat", email = "pierrechat@outlook.com" }]
dependencies = [
    "typer>=0.12",
    "pydantic>=2.6",
    "jinja2>=3.1",
    "filelock>=3.13",
    "rich>=13.7",
    "pyyaml>=6.0",
]

[project.scripts]
squads = "squads.cli:app"
sq = "squads.cli:app"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "freezegun>=1.4",
    "ruff>=0.6",
    "pyright>=1.1.380",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/squads"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py314"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]

[tool.ruff.lint.per-file-ignores]
# Typer relies on function calls (Option/Argument) as parameter defaults.
"src/squads/cli/*" = ["B008"]

[tool.pyright]
include = ["src"]
pythonVersion = "3.14"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"
